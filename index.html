*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;padding-bottom:80px}
.header{background:#1a1a2e;color:#fff;padding:16px;text-align:center;position:sticky;top:0;z-index:10}
.header h1{font-size:20px;margin-bottom:8px}
.search{width:100%;padding:10px 12px;border:none;border-radius:8px;font-size:16px;background:#fff;margin-top:8px}
.section-title{background:#16213e;color:#fff;padding:10px 16px;font-size:15px;font-weight:600;position:sticky;top:88px;z-index:5}
.cat-title{background:#e8e8e8;padding:8px 16px;font-size:13px;font-weight:600;color:#555;text-transform:uppercase}
.item{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #eee;cursor:pointer;transition:background .15s}
.item.checked{background:#e8f5e9}
.item .check{width:28px;height:28px;border-radius:50%;border:2px solid #ccc;margin-right:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.item.checked .check{background:#4caf50;border-color:#4caf50;color:#fff}
.item .info{flex:1}
.item .name{font-size:15px;font-weight:500}
.item .detail{font-size:12px;color:#888;margin-top:2px}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;padding:12px 16px;display:flex;gap:10px;z-index:10}
.bottom-bar .counter{color:#fff;font-size:14px;display:flex;align-items:center;flex:1}
.btn-send{background:#4caf50;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;flex-shrink:0}
.btn-send:disabled{opacity:.4}
.btn-reset{background:#e74c3c;color:#fff;border:none;padding:12px 16px;border-radius:8px;font-size:15px;cursor:pointer;flex-shrink:0}
</style>

var checked = JSON.parse(localStorage.getItem('bestellijst_checked') || '{}');

function saveChecked() {
  localStorage.setItem('bestellijst_checked', JSON.stringify(checked));
}

function updateCounter() {
  var count = Object.keys(checked).filter(function(k){return checked[k]}).length;
  document.getElementById('counter').textContent = count;
  document.getElementById('sendBtn').disabled = count === 0;
}

function render(filter) {
  var el = document.getElementById('list');
  var html = '';
  var currentSection = '';
  var currentCat = '';
  var lowerFilter = (filter||'').toLowerCase();

  products.forEach(function(p) {
    if (lowerFilter && p.name.toLowerCase().indexOf(lowerFilter) === -1) return;
    if (p.section !== currentSection) {
      currentSection = p.section;
      currentCat = '';
      html += '<div class="section-title">' + currentSection + '</div>';
    }
    if (p.category !== currentCat) {
      currentCat = p.category;
      html += '<div class="cat-title">' + currentCat + '</div>';
    }
    var isChecked = checked[p.id];
    html += '<div class="item' + (isChecked ? ' checked' : '') + '" data-id="' + p.id + '">';
    html += '<div class="check">' + (isChecked ? '✓' : '') + '</div>';
    html += '<div class="info"><div class="name">' + p.name + '</div>';
    html += '<div class="detail">' + p.eenheid + '</div>';
    html += '</div></div>';
  });

  el.innerHTML = html;
}

document.getElementById('list').addEventListener('click', function(e) {
  var item = e.target.closest('.item');
  if (!item) return;
  var id = item.getAttribute('data-id');
  checked[id] = !checked[id];
  if (!checked[id]) delete checked[id];
  saveChecked();
  updateCounter();
  item.classList.toggle('checked');
  item.querySelector('.check').textContent = checked[id] ? '✓' : '';
});

document.getElementById('searchInput').addEventListener('input', function() {
  render(this.value);
});

document.getElementById('resetBtn').addEventListener('click', function() {
  if (!confirm('Zeker weten? Alle selecties worden gewist.')) return;
  checked = {};
  saveChecked();
  updateCounter();
  render(document.getElementById('searchInput').value);
});

document.getElementById('sendBtn').addEventListener('click', function() {
  var items = products.filter(function(p){return checked[p.id]});
  items.sort(function(a,b){return (a.leverancier||'').localeCompare(b.leverancier||'')});
  var rows = [['Leverancier','Productnaam','Gewenste Hoeveelheid','Eenheid']];
  items.forEach(function(p) {
    rows.push([p.leverancier||'', p.name, p.gewensteStock||'', p.eenheid||'']);
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Bestelling');
  XLSX.writeFile(wb, 'bestelling_' + new Date().toISOString().slice(0,10) + '.xlsx');
});

render();
updateCounter();
</script>
