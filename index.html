<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🍔 Bestellijst Restaurant</title>
<style>
:root {
  --green: #22c55e; --green-bg: #f0fdf4; --green-border: #86efac;
  --g50: #f9fafb; --g100: #f3f4f6; --g200: #e5e7eb; --g300: #d1d5db;
  --g400: #9ca3af; --g500: #6b7280; --g600: #4b5563; --g700: #374151;
  --g800: #1f2937; --g900: #111827; --r: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--g50); color:var(--g900); padding-bottom:90px;
  -webkit-user-select:none; user-select:none;
}
.header {
  position:sticky; top:0; z-index:100; background:white;
  border-bottom:1px solid var(--g200); padding:12px 16px 8px;
}
.header h1 { font-size:20px; font-weight:700; margin-bottom:8px; }
.search-wrap { position:relative; }
.search-wrap input {
  width:100%; padding:10px 12px 10px 38px;
  border:1px solid var(--g200); border-radius:10px;
  font-size:15px; background:var(--g50); outline:none;
}
.search-wrap input:focus { border-color:var(--green); }
.search-icon {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  width:18px; height:18px; color:var(--g400); pointer-events:none;
}
.section-title {
  font-size:17px; font-weight:700; padding:16px 16px 4px; color:var(--g800);
  background:var(--g50);
}
.category-header {
  font-size:13px; font-weight:600; text-transform:uppercase;
  color:var(--g500); letter-spacing:0.5px; padding:12px 16px 6px;
}
.product-list { padding:0 12px; }
.product-item {
  display:flex; align-items:center; gap:12px; background:white;
  border:2px solid var(--g200); border-radius:var(--r);
  padding:12px 14px; margin-bottom:6px; cursor:pointer;
  transition:all .15s;
}
.product-item.checked {
  border-color:var(--green-border); background:var(--green-bg);
}
.check-circle {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  border:2px solid var(--g300); display:flex; align-items:center;
  justify-content:center; transition:all .15s;
}
.checked .check-circle {
  border-color:var(--green); background:var(--green); color:white;
}
.product-info { flex:1; min-width:0; }
.product-name { font-size:15px; font-weight:600; }
.product-meta {
  font-size:12px; color:var(--g500); margin-top:2px;
  display:flex; flex-wrap:wrap; gap:4px 10px;
}
.bottom-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:white; border-top:1px solid var(--g200);
  padding:10px 16px; display:flex; gap:10px; align-items:center;
}
.counter {
  background:var(--green); color:white; border-radius:20px;
  padding:4px 12px; font-weight:700; font-size:14px; white-space:nowrap;
}
.bottom-bar button {
  flex:1; padding:12px; border:none; border-radius:10px;
  font-size:15px; font-weight:600; cursor:pointer;
}
.btn-send { background:var(--green); color:white; }
.btn-send:disabled { opacity:0.4; cursor:default; }
.btn-reset { background:var(--g100); color:var(--g700); }
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4);
  z-index:300; align-items:center; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:white; border-radius:16px; padding:24px; margin:20px;
  max-width:320px; width:100%; text-align:center;
}
.modal h3 { margin-bottom:8px; }
.modal p { color:var(--g500); font-size:14px; margin-bottom:16px; }
.modal-btns { display:flex; gap:10px; }
.modal-btns button {
  flex:1; padding:10px; border:none; border-radius:10px;
  font-size:14px; font-weight:600; cursor:pointer;
}
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  background:var(--g800); color:white; padding:10px 20px;
  border-radius:10px; font-size:14px; font-weight:500;
  z-index:400; opacity:0; transition:opacity .3s;
}
.toast.show { opacity:1; }
.empty-msg {
  text-align:center; padding:40px 20px; color:var(--g400); font-size:15px;
}
</style>
</head>
<body>

<div class="header">
  <h1>🍔 Bestellijst Restaurant</h1>
  <div class="search-wrap">
    <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Zoek product...">
  </div>
</div>

<div id="content"></div>

<div class="bottom-bar">
  <div class="counter" id="counter">0</div>
  <button class="btn-send" id="sendBtn" disabled>Verstuur</button>
  <button class="btn-reset" id="resetBtn">Reset</button>
</div>

<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>Lijst resetten?</h3>
    <p>Alle vinkjes worden verwijderd.</p>
    <div class="modal-btns">
      <button style="background:var(--g100);color:var(--g700)" id="cancelReset">Annuleren</button>
      <button style="background:#ef4444;color:white" id="confirmReset">Reset</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

var checked = JSON.parse(localStorage.getItem('bestellijst_checked') || '{}');
var searchTerm = '';

function save() { localStorage.setItem('bestellijst_checked', JSON.stringify(checked)); }

function toggle(name) {
  if (checked[name]) delete checked[name];
  else checked[name] = true;
  save(); render();
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 2000);
}

function render() {
  var filtered = products;
  if (searchTerm) {
    var s = searchTerm.toLowerCase();
    filtered = products.filter(function(p) {
      return p.name.toLowerCase().indexOf(s) !== -1 ||
             (p.leverancier && p.leverancier.toLowerCase().indexOf(s) !== -1) ||
             (p.category && p.category.toLowerCase().indexOf(s) !== -1);
    });
  }

  // Group by section then category
  var sections = {};
  var sectionOrder = [];
  filtered.forEach(function(p) {
    if (!sections[p.section]) { sections[p.section] = {}; sectionOrder.push(p.section); }
    if (!sections[p.section][p.category]) sections[p.section][p.category] = [];
    sections[p.section][p.category].push(p);
  });

  var html = '';
  if (filtered.length === 0) {
    html = '<div class="empty-msg">Geen producten gevonden</div>';
  } else {
    sectionOrder.forEach(function(sec) {
      html += '<div class="section-title">' + sec + '</div>';
      var cats = Object.keys(sections[sec]);
      cats.forEach(function(cat) {
        html += '<div class="category-header">' + cat + '</div><div class="product-list">';
        sections[sec][cat].forEach(function(p) {
          var isChecked = !!checked[p.name];
          html += '<div class="product-item' + (isChecked ? ' checked' : '') + '" onclick="toggle(\''+p.name.replace(/'/g,"\\'")+'\')">'+
            '<div class="check-circle">' + (isChecked ? '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>' : '') + '</div>'+
            '<div class="product-info"><div class="product-name">'+p.name+'</div>'+
            '<div class="product-meta">'+
            (p.leverancier ? '<span>🚚 '+p.leverancier+'</span>' : '')+
            (p.levertermijn ? '<span>⏰ '+p.levertermijn+'</span>' : '')+
            (p.minimumStock ? '<span>📦 Min: '+p.minimumStock+'</span>' : '')+
            (p.nodVoor ? '<span>🍽️ '+p.nodVoor+'</span>' : '')+
            '</div></div></div>';
        });
        html += '</div>';
      });
    });
  }
  document.getElementById('content').innerHTML = html;

  var count = Object.keys(checked).length;
  document.getElementById('counter').textContent = count + ' geselecteerd';
  document.getElementById('sendBtn').disabled = count === 0;
}

document.getElementById('searchInput').addEventListener('input', function(e) {
  searchTerm = e.target.value; render();
});

document.getElementById('resetBtn').addEventListener('click', function() {
  document.getElementById('resetModal').className = 'modal-overlay show';
});
document.getElementById('cancelReset').addEventListener('click', function() {
  document.getElementById('resetModal').className = 'modal-overlay';
});
document.getElementById('confirmReset').addEventListener('click', function() {
  document.getElementById('resetModal').className = 'modal-overlay';
  checked = {}; save(); render(); showToast('Lijst gereset \u2713');
});

document.getElementById('sendBtn').addEventListener('click', function() {
  var items = products.filter(function(p) { return checked[p.name]; });
  items.sort(function(a,b) { return (a.leverancier||'').localeCompare(b.leverancier||''); });
  var rows = [['Product','Categorie','Leverancier','Minimum Stock','Levertermijn','Nod Voor']];
  items.forEach(function(p) {
    rows.push([p.name, p.category||'', p.leverancier||'', p.minimumStock||'', p.levertermijn||'', p.nodVoor||'']);
  });
  if (typeof XLSX !== 'undefined') {
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:30},{wch:20},{wch:20},{wch:15},{wch:15},{wch:20}];
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Bestelling');
    var d = new Date();
    var fn = 'bestelling_'+d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()+'.xlsx';
    XLSX.writeFile(wb, fn);
    showToast('Excel gedownload \u2713');
  } else {
    showToast('Excel library niet geladen - check je internet');
  }
});

render();
</script>
